<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convict Gaming | CS2 Skin Panel</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="sidebar">

        <div class="logo">
            <h1>🎮 Convict Gaming</h1>
            <span>CS2 Skin Panel</span>
        </div>

        <button class="steamButton">
            Steam ile Giriş
        </button>

        <div class="menu">

            <div class="card">

                <label>🔪 Knife</label>

                <select id="knife">
                    <option value="">Seçiniz</option>
                </select>

            </div>

            <div class="card">

                <label>🧤 Gloves</label>

                <select id="glove">
                    <option value="">Seçiniz</option>
                </select>

            </div>

            <div class="card">

                <label>🔫 Weapon</label>

                <select id="weapon">
                    <option value="">Seçiniz</option>
                </select>

            </div>

            <div class="card">

                <label>👤 Agent</label>

                <select id="agent">
                    <option value="">Seçiniz</option>
                </select>

            </div>

            <button id="saveButton">

                Kaydet

            </button>

        </div>

    </div>

    <div class="content">

        <div class="preview">

            <img id="skinImage" src="https://placehold.co/900x600?text=Convict+Gaming">

            <h2 id="skinName">

                Skin Seçilmedi

            </h2>

            <p>

                Burada seçtiğin skin büyük olarak görünecek.

            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
