<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:#0f1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
width:500px;
background:#1a1d29;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.5);
}
h1{
font-size:40px;
margin-bottom:10px;
}
p{
opacity:.7;
margin-bottom:30px;
}
.btn{
display:block;
background:#ffb000;
color:#000;
padding:15px;
margin:12px 0;
text-decoration:none;
font-weight:bold;
border-radius:12px;
transition:.2s;
}
.btn:hover{
transform:scale(1.03);
}
.footer{
margin-top:25px;
opacity:.5;
font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<a class="btn" href="#">🔐 Steam ile Giriş</a>

<a class="btn" href="#">🔫 Skinler</a>

<div class="footer">
Convict Gaming © 2026
</div>

</div>
